<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>7-index</title>

    <link rel="icon" href="images/icon.png">

    <link rel="stylesheet" href="styles/4-common.css">
    <link rel="stylesheet" href="styles/3-header.css">
    <link rel="stylesheet" href="styles/3-footer.css">
    <link rel="stylesheet" href="styles/6-filters.css">
    <link rel="stylesheet" href="styles/7-places.css">
</head>
<body>

    <header>
        <div class="logo"></div>
    </header>

    <div class="container">

        <!-- Filters -->
        <section class="filters">

            <div class="locations">
                <h3>States</h3>
                <h4>California, Texas...</h4>

                <ul class="popover">
                    <li>
                        <h2>California</h2>
                        <ul>
                            <li>Los Angeles</li>
                            <li>San Francisco</li>
                        </ul>
                    </li>
                    <li>
                        <h2>Texas</h2>
                        <ul>
                            <li>Houston</li>
                            <li>Dallas</li>
                        </ul>
                    </li>
                </ul>
            </div>

            <div class="amenities">
                <h3>Amenities</h3>
                <h4>WiFi, Pool...</h4>

                <ul class="popover">
                    <li>WiFi</li>
                    <li>Pool</li>
                </ul>
            </div>

            <button>Search</button>
        </section>

        <!-- Places -->
        <section class="places">
            <h1>Places</h1>

            <article>
                <h2>My Home</h2>
            </article>

            <article>
                <h2>Tiny House</h2>
            </article>

            <article>
                <h2>A Suite</h2>
            </article>

        </section>

    </div>

    <footer>
        Holberton School
    </footer>

</body>
</html>
